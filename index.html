<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surprise</title>
  <style>
    :root {
      --bg1: #fffaf2;
      --bg2: #ffe7bf;
      --card: rgba(255,255,255,0.82);
      --text: #4a3422;
      --accent: #f59e0b;
      --accent2: #f97316;
      --shadow: 0 20px 50px rgba(120, 80, 20, 0.16);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff 0%, transparent 28%),
        radial-gradient(circle at bottom right, #ffe7bf 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 24px;
      overflow: hidden;
    }

    .floating-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .shape {
      position: absolute;
      bottom: -40px;
      font-size: 18px;
      opacity: 0.18;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.18; }
      to { transform: translateY(-115vh) rotate(18deg); opacity: 0; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(18px, 3vw, 28px);
    }

    .scratch-shell {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, #fff8ef, #fffdf9);
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.12);
    }

    .surprise {
      min-height: 360px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.12), transparent 30%),
        linear-gradient(180deg, #fffdfb, #fff4df);
    }

    .surprise-inner {
      max-width: 560px;
    }

    .surprise h2 {
      margin: 0;
      font-size: clamp(1.6rem, 3.8vw, 2.6rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    canvas#scratchCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    canvas#confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 3;
    }

    .revealed #scratchCanvas {
      opacity: 0;
      pointer-events: none;
      transition: opacity 450ms ease;
    }

    @media (max-width: 600px) {
      .surprise { min-height: 320px; padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="floating-shapes" aria-hidden="true"></div>
  <canvas id="confettiCanvas"></canvas>

  <main class="wrap">
    <section class="card">
      <div class="scratch-shell" id="scratchShell">
        <div class="surprise">
          <div class="surprise-inner">
            <h2 id="surpriseText">Keep scratching!</h2>
          </div>
        </div>
        <canvas id="scratchCanvas"></canvas>
      </div>
    </section>
  </main>

  <script>
    const shell = document.getElementById('scratchShell');
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const confettiCanvas = document.getElementById('confettiCanvas');
    const confettiCtx = confettiCanvas.getContext('2d');

    let drawing = false;
    let lastPoint = null;
    let revealed = false;
    const surpriseText = document.getElementById('surpriseText');
    let confettiPieces = [];
    let confettiRunning = false;

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = shell.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(ratio, ratio);
      paintCover(rect.width, rect.height);
      updateProgress();
    }

    function resizeConfettiCanvas() {
      const ratio = window.devicePixelRatio || 1;
      confettiCanvas.width = Math.floor(window.innerWidth * ratio);
      confettiCanvas.height = Math.floor(window.innerHeight * ratio);
      confettiCanvas.style.width = window.innerWidth + 'px';
      confettiCanvas.style.height = window.innerHeight + 'px';
      confettiCtx.setTransform(1, 0, 0, 1, 0, 0);
      confettiCtx.scale(ratio, ratio);
    }

    function paintCover(width, height) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, '#fbbf24');
      gradient.addColorStop(1, '#f97316');
      ctx.globalCompositeOperation = 'source-over';
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = 'rgba(255,255,255,0.20)';
      for (let i = 0; i < 18; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.random() * width,
          Math.random() * height,
          12 + Math.random() * 28,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '700 28px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Scratch me!', width / 2, height / 2);
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const point = event.touches ? event.touches[0] : event;
      return {
        x: point.clientX - rect.left,
        y: point.clientY - rect.top,
      };
    }

    function scratchAt(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 24, 0, Math.PI * 2);
      ctx.fill();

      if (lastPoint) {
        ctx.lineWidth = 48;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastPoint.x, lastPoint.y);
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      lastPoint = { x, y };
    }

    function startScratch(event) {
      if (revealed) return;
      drawing = true;
      lastPoint = null;
      const { x, y } = getPoint(event);
      scratchAt(x, y);
      updateProgress();
    }

    function moveScratch(event) {
      if (!drawing || revealed) return;
      event.preventDefault();
      const { x, y } = getPoint(event);
      scratchAt(x, y);
      updateProgress();
    }

    function endScratch() {
      drawing = false;
      lastPoint = null;
    }

    function updateProgress() {
      const rect = shell.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      const imageData = ctx.getImageData(0, 0, width, height).data;
      let transparent = 0;
      let sampled = 0;

      for (let y = 0; y < height; y += 2) {
        for (let x = 0; x < width; x += 2) {
          const i = (y * width + x) * 4 + 3;
          if (imageData[i] < 128) transparent++;
          sampled++;
        }
      }

      const percent = Math.round((transparent / sampled) * 100);

      if (percent >= 65 && !revealed) {
        revealAll();
      }
    }

    function revealAll() {
      revealed = true;
      shell.classList.add('revealed');
      surpriseText.textContent = 'You’re going to be an aunt 👶';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      launchConfetti();
    }

    function launchConfetti() {
      if (confettiRunning) return;
      confettiRunning = true;
      const colors = ['#f59e0b', '#f97316', '#fde68a', '#ffffff', '#fb923c', '#f9a8d4', '#93c5fd'];
      const babySymbols = ['👶', '🍼', '⭐', '🧸', '🌟'];
      confettiPieces = Array.from({ length: 150 }, (_, index) => ({
        type: index % 4 === 0 ? 'emoji' : 'rect',
        symbol: babySymbols[Math.floor(Math.random() * babySymbols.length)],
        x: Math.random() * window.innerWidth,
        y: -20 - Math.random() * window.innerHeight * 0.4,
        w: 6 + Math.random() * 8,
        h: 10 + Math.random() * 12,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        rotation: Math.random() * Math.PI,
        vr: -0.2 + Math.random() * 0.4,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 18 + Math.random() * 12,
        life: 100 + Math.random() * 55,
      }));
      requestAnimationFrame(animateConfetti);
    }

    function animateConfetti() {
      confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      confettiPieces.forEach(piece => {
        piece.x += piece.vx;
        piece.y += piece.vy;
        piece.rotation += piece.vr;
        piece.vy += 0.03;
        piece.life -= 1;

        confettiCtx.save();
        confettiCtx.translate(piece.x, piece.y);
        confettiCtx.rotate(piece.rotation);
        if (piece.type === 'emoji') {
          confettiCtx.font = `${piece.size}px system-ui`;
          confettiCtx.textAlign = 'center';
          confettiCtx.textBaseline = 'middle';
          confettiCtx.fillText(piece.symbol, 0, 0);
        } else {
          confettiCtx.fillStyle = piece.color;
          confettiCtx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
        }
        confettiCtx.restore();
      });

      confettiPieces = confettiPieces.filter(piece => piece.life > 0 && piece.y < window.innerHeight + 40);

      if (confettiPieces.length > 0) {
        requestAnimationFrame(animateConfetti);
      } else {
        confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        confettiRunning = false;
      }
    }

    canvas.addEventListener('mousedown', startScratch);
    canvas.addEventListener('mousemove', moveScratch);
    window.addEventListener('mouseup', endScratch);
    canvas.addEventListener('touchstart', startScratch, { passive: true });
    canvas.addEventListener('touchmove', moveScratch, { passive: false });
    window.addEventListener('touchend', endScratch);

    function spawnShapes() {
      const container = document.querySelector('.floating-shapes');
      const symbols = ['✨', '⭐', '🌼', '☀️'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'shape';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.animationDuration = (8 + Math.random() * 9) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        el.style.fontSize = (14 + Math.random() * 18) + 'px';
        container.appendChild(el);
      }
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      resizeConfettiCanvas();
    });

    spawnShapes();
    resizeCanvas();
    resizeConfettiCanvas();
  </script>
</body>
</html>
